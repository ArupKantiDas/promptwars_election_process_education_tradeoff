name: Symmetry CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  symmetry:
    name: Symmetry CI — candidate corpus bands
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      # No GCP_PROJECT_ID → backend boots in deterministic stub mode
      # (server/src/llm/gemini.ts checks this env var). Stub mode is what
      # the symmetry test must pass against; live-mode drift belongs in a
      # separate calibration job, not this gate.
      NODE_ENV: test
      PORT: "8080"
      BACKEND_URL: "http://localhost:8080"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install server dependencies
        run: npm ci --prefix server

      - name: Start backend (stub mode)
        run: |
          mkdir -p artifacts
          npm run server:start:ci > artifacts/server.log 2>&1 &
          echo $! > artifacts/server.pid
        # Background; the next step waits on /healthz.

      - name: Wait for backend /healthz
        run: |
          for i in $(seq 1 60); do
            if curl --fail --silent --show-error "$BACKEND_URL/healthz" > /dev/null; then
              echo "backend healthy after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "backend failed to come up within 60s"
          tail -n 200 artifacts/server.log || true
          exit 1

      - name: Run symmetry test
        run: npm run symmetry

      - name: Stop backend
        if: always()
        run: |
          if [ -f artifacts/server.pid ]; then
            kill "$(cat artifacts/server.pid)" 2>/dev/null || true
          fi

      - name: Upload server log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: symmetry-server-log
          path: artifacts/server.log
          if-no-files-found: ignore
